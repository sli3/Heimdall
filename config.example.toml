[wazuh]
host = "YOUR_WAZUH_MANAGER_IP"
port = 55000
user = "YOUR_WAZUH_API_USER"
password = "YOUR_WAZUH_API_PASSWORD"

# Wazuh Indexer (OpenSearch) — usually same host, port 9200
indexer_host = "YOUR_WAZUH_INDEXER_IP"
indexer_port = 9200
indexer_user = "admin"
indexer_password = "YOUR_INDEXER_PASSWORD"

[llm]
base_url = "http://YOUR_LLAMA_CPP_SERVER_IP:8080/v1"
api_key = "local"
model = "Qwen3"
temperature = 0.3
max_tokens = 1024

[reports]
output_dir = "reports"

[baseline]
path = "data/baseline_state.json"

[trending]
# Rolling window in days for trend analysis
window_days = 30
# Write standalone trending_YYYY-MM-DD.md report
output_standalone = false

[mitre]
# Path to local MITRE ATT&CK dataset (JSON format)
path = "data/mitre_attack.json"
# MITRE ATT&CK dataset source URL
sync_source = "https://raw.githubusercontent.com/mitre-attack/attack-stix-data/master/enterprise-attack/enterprise-attack.json"

[embeddings]
endpoint = "http://localhost:8081/v1"
model = "Qwen3-Embedding-0.6B"
chroma_db_path = "~/.heimdall/chromadb"
top_k = 5

[asd]
path = "data/asd_framework.json"

[platform]
# Path to platform false positive hint table
# Edit this file directly to add new hints — no code change required
hints_path = "data/platform_hints.json"